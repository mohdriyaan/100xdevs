<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter App</title>
</head>
<body>
  <div id="buttonParent">

  </div>
</body>
<script>
  let state = {
    count : 0
  }

  function buttonComponent(count){
    const btn = document.createElement("button")
    btn.innerHTML = `Counter ${count}`
    btn.setAttribute("onclick","updateCounter()")
    return btn
  }

  function updateCounter(){
    state.count++
    buttonComponentRender()
  }

  function buttonComponentRender(){
    const parentEle = document.getElementById("buttonParent").innerHTML = ""
    const button = buttonComponent(state.count)
    document.getElementById("buttonParent").appendChild(button)
  }

  buttonComponentRender()
</script>
</html>

<!-- React works like this under the hood -->
